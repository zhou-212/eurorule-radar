name: Build and deploy to weiread.com (user page)

on:
  push:
    branches: [main]
  workflow_dispatch:

# 不使用 deploy-pages 直接部署到本仓(本仓是源码仓)。
# 改为: build → 同步 dist 到 zhou-212/zhou-212.github.io 仓的 main 分支,
# GitHub Pages 会在 user page 仓自动发布到 weiread.com。
# 因此 permissions 不需要 pages:write / id-token:write。

permissions:
  contents: read

concurrency:
  group: eurorule-radar-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build (SITE=weiread.com, BASE=/)
        env:
          SITE: https://weiread.com
          BASE: /
        run: npm run build:fast

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./dist
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./dist

      - name: Sync dist to zhou-212/zhou-212.github.io (user page)
        env:
          PUSH_TOKEN: ${{ secrets.PAGES_PUSH_TOKEN }}
          USER_PAGE_REPO: zhou-212/zhou-212.github.io
          DEPLOY_BRANCH: main
          EXPECTED_CNAME: weiread.com
        run: |
          set -euo pipefail

          if [ -z "$PUSH_TOKEN" ]; then
            echo "::error::PAGES_PUSH_TOKEN secret is missing. See README § 部署."
            exit 1
          fi

          # 1) shallow clone user page 仓
          git clone --depth 1 --branch "$DEPLOY_BRANCH" \
            "https://x-access-token:${PUSH_TOKEN}@github.com/${USER_PAGE_REPO}.git" \
            user-page
          cd user-page

          # 2) 保留 GitHub Pages 关键配置文件:
          #      CNAME     — custom domain (weiread.com)
          #      .nojekyll — 禁用 Jekyll 渲染(让 _astro 走原始路径)
          declare -a KEEP=()
          for f in CNAME .nojekyll; do
            if [ -f "$f" ]; then
              KEEP+=("$f")
            else
              echo "::warning::$f not found in $USER_PAGE_REPO; creating empty placeholder."
            fi
          done

          # 3) CNAME sanity:如果现有 CNAME 不是 EXPECTED_CNAME,大声报警但继续
          if [ -f CNAME ] && [ "$(cat CNAME | tr -d '\r\n' | tr -d ' ')" != "$EXPECTED_CNAME" ]; then
            echo "::warning::CNAME on user page repo is '$(cat CNAME)', expected '$EXPECTED_CNAME'."
            echo "         Workflow will not modify CNAME, but verify DNS / GitHub Pages settings."
          fi

          # 4) 删除除保留文件 / .git 外的所有文件
          git rm -r --cached . >/dev/null 2>&1 || true
          while IFS= read -r -d '' entry; do
            rel="${entry#./}"
            skip=0
            for k in "${KEEP[@]}"; do
              if [ "$rel" = "$k" ]; then skip=1; break; fi
            done
            case "$rel" in
              .git) skip=1 ;;
              .git/*) skip=1 ;;
            esac
            if [ $skip -eq 0 ]; then rm -rf "$rel"; fi
          done < <(find . -mindepth 1 -maxdepth 1 -print0)

          # 5) 拷新 dist 过来
          cd ..
          cp -r dist/. user-page/
          cd user-page

          # 6) 不该进 user page 仓 main 分支的 dist 产物(纯文档占位)
          rm -f CNAME.example          # 模板占位,真实 CNAME 在 KEEP 里
          rm -f runtime-config.example.js
          # runtime-config.example.js 是订阅后端集成的 example 模板,
          # 部署到生产会让用户误以为可以直接用;删了,只在源码仓有 example。
          # 真正启用后端时,用户会自己 cp + 填 API_BASE_URL 然后单独 push。
          # 见 README § 部署 → "接入订阅后端"。

          # 7) commit + push
          git config user.name  "eurorule-radar-bot"
          git config user.email "actions@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No changes in dist; nothing to push."
            exit 0
          fi

          echo "---- final tree (top-level only) ----"
          ls -la | head -40

          git commit -m "deploy: sync dist from zhou-212/eurorule-radar@${{ github.sha }}

          Triggered by: ${{ github.event_name }} on ${{ github.ref }}
          Source commit: ${{ github.sha }}
          Source repo:   ${{ github.repository }}"

          git push \
            "https://x-access-token:${PUSH_TOKEN}@github.com/${USER_PAGE_REPO}.git" \
            "HEAD:${DEPLOY_BRANCH}"
